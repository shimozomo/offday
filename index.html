<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>希望休申請・シフト管理システム - ポータル</title>
  <link rel="stylesheet" href="app.css">
  <style>
    .portal-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 120px);
      padding: 2rem;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }
    .portal-header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeIn 0.8s ease-out;
    }
    .portal-logo {
      height: 80px;
      width: 80px;
      border-radius: 12px;
      object-fit: contain;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
    }
    .portal-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    .portal-subtitle {
      color: var(--text-sub);
      font-size: 1.1rem;
    }
    .portal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
      width: 100%;
      animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .portal-card {
      padding: 2.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }
    .portal-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--accent-gradient);
      opacity: 0;
      transition: opacity var(--transition-normal);
    }
    .portal-card:hover::before {
      opacity: 1;
    }
    .portal-card:hover {
      transform: translateY(-8px);
      border-color: var(--border-focus);
      box-shadow: var(--shadow-lg), 0 0 30px var(--accent-glow);
    }
    .portal-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
      transition: transform var(--transition-normal);
    }
    .portal-card:hover .portal-icon {
      transform: scale(1.15) rotate(5deg);
    }
    .card-title {
      font-size: 1.5rem;
      color: var(--text-main);
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .card-desc {
      color: var(--text-sub);
      font-size: 0.95rem;
      line-height: 1.6;
      flex-grow: 1;
      margin-bottom: 1.5rem;
    }
    .portal-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-sm);
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid var(--border-color);
      color: var(--accent-color);
      font-weight: 600;
      transition: var(--transition-normal);
      width: 100%;
    }
    .portal-card:hover .portal-btn {
      background: var(--accent-gradient);
      color: var(--bg-dark);
      border-color: transparent;
      box-shadow: 0 0 15px var(--accent-glow);
    }
    .portal-footer {
      text-align: center;
      margin-top: 4rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="portal-container">
    <header class="portal-header">
      <img src="logo.png" alt="株式会社enTrust" class="portal-logo">
      <h1 class="portal-title text-gradient">希望休申請・シフト管理システム</h1>
      <p class="portal-subtitle">ご利用の機能を選択してください</p>
    </header>

    <div class="portal-grid">
      <a href="driver.html" class="glass-panel portal-card">
        <div class="portal-icon">🚚</div>
        <h2 class="card-title">ドライバー用ポータル</h2>
        <p class="card-desc">
          希望休カレンダーからの希望日提出、申請状況（保留・承認・却下）の履歴確認、および確定した運行シフト表の閲覧が可能です。
        </p>
        <span class="portal-btn">ドライバー画面を開く</span>
      </a>

      <a href="admin.html" class="glass-panel portal-card">
        <div class="portal-icon">⚙️</div>
        <h2 class="card-title">運行管理者用ポータル</h2>
        <p class="card-desc">
          ドライバーから提出された希望休の承認・却下判断、自動シフト生成および手動微調整、CSV出力、GASを介したスプレッドシートへのエクスポート管理を行います。
        </p>
        <span class="portal-btn">管理者画面を開く</span>
      </a>
    </div>

    <footer class="portal-footer">
      &copy; 2026 株式会社enTrust. All Rights Reserved.
    </footer>
  </div>
</body>
</html>
